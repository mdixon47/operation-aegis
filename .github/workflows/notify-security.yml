name: Notify Security

on:
    workflow_run:
        workflows:
            - CI Test Gate
            - Config Scan
            - DAST - ZAP Baseline
            - Deploy - Staging
            - SAST - CodeQL
            - SCA - Dependency Review
            - Secrets Scan
        types:
            - completed

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    report-failure:
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Build failure report
              id: report
              env:
                  WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
                  CONCLUSION: ${{ github.event.workflow_run.conclusion }}
                  BRANCH: ${{ github.event.workflow_run.head_branch }}
                  COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
                  RUN_URL: ${{ github.event.workflow_run.html_url }}
              run: |
                  {
                    echo 'body<<EOF'
                    echo "### DevSecOps gate failed"
                    echo
                    echo "- Workflow: ${WORKFLOW_NAME}"
                    echo "- Conclusion: ${CONCLUSION}"
                    echo "- Branch: ${BRANCH}"
                    echo "- Commit: ${COMMIT_SHA}"
                    echo "- Logs: ${RUN_URL}"
                    echo
                    echo "This failure blocks merge or deployment until remediated."
                    echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Comment on the pull request
              if: ${{ github.event.workflow_run.event == 'pull_request' && toJson(github.event.workflow_run.pull_requests) != '[]' }}
              uses: actions/github-script@v9
              env:
                  BODY: ${{ steps.report.outputs.body }}
              with:
                  script: |
                      const marker = '<!-- devsecops-report -->'
                      const issue_number = context.payload.workflow_run.pull_requests[0].number
                      const body = `${marker}\n${process.env.BODY}`
                      const comments = await github.paginate(github.rest.issues.listComments, {
                        ...context.repo,
                        issue_number,
                        per_page: 100,
                      })
                      const existing = comments.find((comment) =>
                        comment.user.type === 'Bot' && comment.body.includes(marker)
                      )

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...context.repo,
                          comment_id: existing.id,
                          body,
                        })
                      } else {
                        await github.rest.issues.createComment({
                          ...context.repo,
                          issue_number,
                          body,
                        })
                      }

            - name: Open or update a tracking issue
              if: ${{ github.event.workflow_run.event != 'pull_request' }}
              uses: actions/github-script@v9
              env:
                  BODY: ${{ steps.report.outputs.body }}
              with:
                  script: |
                      const title = `DevSecOps alert: ${context.payload.workflow_run.name} failing on ${context.payload.workflow_run.head_branch}`
                      const issues = await github.paginate(github.rest.issues.listForRepo, {
                        ...context.repo,
                        state: 'open',
                        per_page: 100,
                      })
                      const existing = issues.find((issue) => issue.title === title)
                      if (existing) {
                        await github.rest.issues.update({
                          ...context.repo,
                          issue_number: existing.number,
                          body: process.env.BODY,
                        })
                      } else {
                        await github.rest.issues.create({
                          ...context.repo,
                          title,
                          body: process.env.BODY,
                        })
                      }
