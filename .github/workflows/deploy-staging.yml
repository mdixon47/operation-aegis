name: Deploy - Staging

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Git ref to deploy
                required: false
                default: main
            dry_run:
                description: Validate controls without running the deployment command
                required: false
                type: boolean
                default: false

permissions:
    contents: read
    deployments: write
    security-events: write

concurrency:
    group: deploy-staging
    cancel-in-progress: false

jobs:
    pre-deploy-gate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Run repository tests
              env:
                  CI_TEST_COMMAND: ${{ vars.CI_TEST_COMMAND }}
              run: bash ./.github/scripts/run-tests.sh

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Run Trivy config scan
              run: |
                  docker run --rm \
                    -v "$PWD:/work" \
                    -w /work \
                    aquasec/trivy:0.56.1 \
                    config \
                    --severity CRITICAL,HIGH \
                    --format sarif \
                    --output trivy-config.sarif \
                    --exit-code 1 \
                    .

            - name: Upload SARIF to code scanning
              if: ${{ always() && hashFiles('trivy-config.sarif') != '' }}
              continue-on-error: true
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: trivy-config.sarif

    deploy:
        needs: pre-deploy-gate
        runs-on: ubuntu-latest
        environment:
            name: staging
            url: ${{ vars.STAGING_URL }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Dry run summary
              if: ${{ inputs.dry_run }}
              run: |
                  echo "Dry run enabled: security and test gates passed; deployment command skipped." >> "$GITHUB_STEP_SUMMARY"

            - name: Run repository staging deployment scaffold
              if: ${{ !inputs.dry_run && vars.DEPLOY_STAGING_COMMAND == '' }}
              run: bash ./.github/scripts/deploy-staging.sh

            - name: Run custom staging deployment
              if: ${{ !inputs.dry_run && vars.DEPLOY_STAGING_COMMAND != '' }}
              run: ${{ vars.DEPLOY_STAGING_COMMAND }}

            - name: Upload staging bundle
              if: ${{ !inputs.dry_run && hashFiles('dist/staging/**') != '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: staging-release-bundle
                  path: dist/staging
                  if-no-files-found: ignore
