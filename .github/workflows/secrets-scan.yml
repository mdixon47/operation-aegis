name: Secrets Scan

on:
    pull_request:
    push:
        branches:
            - main
            - master

permissions:
    contents: read

concurrency:
    group: secrets-scan-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    gitleaks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
