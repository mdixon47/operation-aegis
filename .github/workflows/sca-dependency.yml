name: SCA - Dependency Review

on:
    pull_request:

permissions:
    contents: read

concurrency:
    group: dependency-review-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    check-dependency-review:
        runs-on: ubuntu-latest
        outputs:
            enabled: ${{ steps.check.outputs.enabled }}
        permissions:
            contents: read
        steps:
            - name: Check dependency review availability
              id: check
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  response_file="$(mktemp)"
                  status_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/$GITHUB_REPOSITORY/dependency-graph/sbom")"

                  if [[ "$status_code" == "200" ]]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [[ "$status_code" == "403" || "$status_code" == "404" ]]; then
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "Unexpected response while checking dependency review availability (HTTP $status_code)." >&2
                  cat "$response_file" >&2
                  exit 1

    dependency-review:
        needs: check-dependency-review
        if: ${{ needs.check-dependency-review.outputs.enabled == 'true' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Review dependency changes
              uses: actions/dependency-review-action@v4
              with:
                  fail-on-severity: high

    dependency-review-disabled:
        needs: check-dependency-review
        if: ${{ needs.check-dependency-review.outputs.enabled != 'true' }}
        runs-on: ubuntu-latest
        steps:
            - name: Summarize skip
              run: |
                  echo "Dependency Review skipped because this repository does not currently support the dependency review feature." >> "$GITHUB_STEP_SUMMARY"
                  echo "Enable Dependency Graph and GitHub Advanced Security in repository settings, or use a repo/account plan that supports dependency review for private repositories." >> "$GITHUB_STEP_SUMMARY"
